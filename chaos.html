<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Incorrupt — Simulador de Falhas</title>
<link rel="stylesheet" href="/public/theme.css">
<style>
  .ctl-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 12px; }
  .ctl { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 16px; border: 1px solid var(--brd); border-radius: var(--radius-sm); background: var(--sur2); }
  .ctl .nm { font-family: var(--mono); font-size: 13px; white-space: nowrap; }
  .ctl .acts { display: flex; gap: 8px; flex-shrink: 0; }
  .ctl .acts .btn-sm { white-space: nowrap; }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="topbar">
    <h2>Simulador de Falhas</h2>
    <div class="bft-tag">Simulação de falhas</div>
  </div>

  <div class="scroll-area">
    <p class="page-desc">Abata e restaure nós de auditoria para observar a tolerância a falhas. Com 4 nós e quórum 3, o sistema continua a aceitar registos com 1 nó em baixo; abaixo do quórum, deixa de aceitar até recuperar.</p>

    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Nós ativos</div><div class="stat-value" id="statNodes" style="color:var(--ok)">—</div></div>
      <div class="stat"><div class="stat-label">Quórum</div><div class="stat-value" id="statQuorum" style="color:var(--acc)">—</div></div>
      <div class="stat"><div class="stat-label">Ambiente</div><div class="stat-value" id="statMode">—</div></div>
    </div>

    <div class="nodes" id="nodesGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:14px; margin-bottom:20px;">
      <div class="skeleton" style="height:70px"></div>
      <div class="skeleton" style="height:70px"></div>
      <div class="skeleton" style="height:70px"></div>
      <div class="skeleton" style="height:70px"></div>
    </div>

    <div class="panel">
      <div class="panel-hdr">
        <span>Controlo de falhas</span>
        <button class="btn-sm" onclick="reconcile()">Reconciliar nós</button>
      </div>
      <div class="panel-body">
        <div class="ctl-grid" id="ctlGrid"></div>
      </div>
    </div>
  </div>
</main>

<script src="/public/app.js"></script>
<script>
const TOTAL = 4;

function renderControls() {
  const grid = document.getElementById('ctlGrid');
  grid.innerHTML = Array.from({ length: TOTAL }, (_, i) => `
    <div class="ctl">
      <span class="nm">audit_node_${i + 1}</span>
      <div class="acts">
        <button class="btn-sm" style="border-color:var(--err); color:var(--err)" onclick="killNode(${i})">Abater</button>
        <button class="btn-sm" style="border-color:var(--ok); color:var(--ok)" onclick="reviveNode(${i})">Restaurar</button>
      </div>
    </div>`).join('');
}

async function post(path, body) {
  const token = localStorage.getItem('dems_token');
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body || {}),
  });
  return { ok: res.ok, data: await res.json() };
}

async function killNode(index) {
  if (!confirm(`Abater o nó audit_node_${index + 1}? Abaixo do quórum (3 de 4) o sistema deixa de aceitar registos.`)) return;
  try {
    const { ok, data } = await post('/api/v1/health/kill-node', { nodeIndex: index });
    showToast(ok ? 'Nó abatido' : 'Erro', ok ? data.message : (data.error || data.message), ok ? 'error' : 'error');
    if (typeof checkHealth === 'function') checkHealth();
  } catch (e) { showToast('Erro', e.message, 'error'); }
}

async function reviveNode(index) {
  try {
    const { ok, data } = await post('/api/v1/health/revive-node', { nodeIndex: index });
    showToast(ok ? 'Nó restaurado' : 'Erro', ok ? data.message : (data.error || data.message), ok ? 'success' : 'error');
    if (typeof checkHealth === 'function') checkHealth();
  } catch (e) { showToast('Erro', e.message, 'error'); }
}

async function reconcile() {
  try {
    const { ok, data } = await post('/api/v1/health/reconcile', {});
    if (!ok) { showToast('Erro', data.error || 'Falha na reconciliação.', 'error'); return; }
    const changed = (data.reports || []).filter(r => !r.alreadyConsistent);
    if (!changed.length) {
      showToast('Reconciliação', 'Todos os nós já estavam consistentes.', 'success');
    } else {
      const summary = changed.map(r => `${r.targetNode}: +${r.copied}/-${r.removed}`).join(' · ');
      showToast('Reconciliação concluída', summary, 'success');
    }
    if (typeof checkHealth === 'function') checkHealth();
  } catch (e) { showToast('Erro', e.message, 'error'); }
}

renderControls();
</script>
</body>
</html>
