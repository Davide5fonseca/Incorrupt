<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Incorrupt — Painel</title>
<link rel="stylesheet" href="/public/theme.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="topbar">
    <h2>Painel</h2>
    <div style="display:flex; gap:12px; align-items:center">
      <a class="btn-primary" href="/upload">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Registar prova
      </a>
      <div class="bft-tag">Consenso BFT</div>
    </div>
  </div>

  <div class="scroll-area">
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-top">
          <div><div class="kpi-label">Nós ativos</div></div>
          <div class="kpi-ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg></div>
        </div>
        <div class="kpi-value" id="kNodes">—</div>
        <div class="kpi-sub" id="kNodesSub">a carregar…</div>
      </div>
      <div class="kpi">
        <div class="kpi-top"><div class="kpi-label">Quórum</div><div class="kpi-ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg></div></div>
        <div class="kpi-value" id="kQuorum">—</div>
        <div class="kpi-sub" id="kQuorumSub">3 de 4 necessários</div>
      </div>
      <div class="kpi">
        <div class="kpi-top"><div class="kpi-label">Provas registadas</div><div class="kpi-ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div></div>
        <div class="kpi-value" id="kProofs">—</div>
        <div class="kpi-sub" id="kProofsSub">na cadeia de custódia</div>
      </div>
      <div class="kpi">
        <div class="kpi-top"><div class="kpi-label">Integridade</div><div class="kpi-ic"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div></div>
        <div class="kpi-value" id="kIntegrity">—</div>
        <div class="kpi-sub" id="kIntegritySub">verificação da cadeia</div>
      </div>
    </div>

    <div class="grid-2" style="margin-top:24px; align-items:start">
      <div class="panel" style="margin:0">
        <div class="panel-hdr"><span>Atividade recente</span><a class="btn-sm" href="/explorer">Ver tudo</a></div>
        <div class="panel-body" id="activity">
          <div class="skeleton" style="height:54px; margin-bottom:10px"></div>
          <div class="skeleton" style="height:54px; margin-bottom:10px"></div>
          <div class="skeleton" style="height:54px"></div>
        </div>
      </div>

      <div class="panel" style="margin:0">
        <div class="panel-hdr"><span>Nós de auditoria</span><a class="btn-sm" href="/chaos">Simular falhas</a></div>
        <div class="panel-body" id="nodeHealth">
          <div class="skeleton" style="height:44px; margin-bottom:10px"></div>
          <div class="skeleton" style="height:44px; margin-bottom:10px"></div>
          <div class="skeleton" style="height:44px; margin-bottom:10px"></div>
          <div class="skeleton" style="height:44px"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="/public/app.js"></script>
<script>
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const tok = () => localStorage.getItem('dems_token');
const ACT = {
  EVIDENCE_UPLOAD:  { label: 'Registo de prova',          icon: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>' },
  CUSTODY_TRANSFER: { label: 'Transferência de custódia', icon: '<path d="M16 3h5v5"/><path d="M21 3l-7 7"/><path d="M8 21H3v-5"/><path d="M3 21l7-7"/>' },
};
const actInfo = (a) => ACT[a] || { label: (a || '').startsWith('ACCESS_LOG') ? 'Acesso/verificação' : a, icon: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>' };

async function api(path) {
  const r = await fetch('/api/v1' + path, { headers: { 'Authorization': 'Bearer ' + tok() } });
  return r.json();
}

async function load() {
  try {
    const [health, blocksRes, integ] = await Promise.all([
      api('/health'), api('/chain/blocks?limit=6'), api('/chain/integrity'),
    ]);

    // KPIs
    const q = health.quorum || {};
    document.getElementById('kNodes').textContent = `${q.healthy}/${q.total}`;
    document.getElementById('kNodesSub').textContent = health.mode || '—';
    const okQ = q.quorumAchievable;
    const kQ = document.getElementById('kQuorum');
    kQ.textContent = okQ ? 'Garantido' : 'Em falha';
    kQ.style.color = okQ ? 'var(--ok)' : 'var(--err)';

    const allBlocks = (await api('/chain/blocks?limit=1000')).blocks || [];
    document.getElementById('kProofs').textContent = allBlocks.filter(b => b.action === 'EVIDENCE_UPLOAD').length;

    const kI = document.getElementById('kIntegrity');
    kI.textContent = integ.valid ? 'Íntegra' : 'Comprometida';
    kI.style.color = integ.valid ? 'var(--ok)' : 'var(--err)';
    document.getElementById('kIntegritySub').textContent = `${integ.totalBlocks ?? 0} blocos · ${integ.certifiedBlocks ?? 0} certificados`;

    // Atividade recente
    const blocks = blocksRes.blocks || [];
    const act = document.getElementById('activity');
    act.innerHTML = blocks.length ? blocks.map(b => {
      const info = actInfo(b.action);
      return `<div class="act-row">
        <div class="act-ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${info.icon}</svg></div>
        <div class="act-main">
          <div class="act-title">${info.label} · ${esc(b.fileName)}</div>
          <div class="act-sub">${esc(String(b.currentHash).slice(0, 24))}…</div>
        </div>
        <div class="act-meta">#${b.blockIndex} · ${b.consensusCount} nós</div>
      </div>`;
    }).join('') : '<div class="empty">Ainda não há atividade.</div>';

    // Saúde dos nós
    const nh = document.getElementById('nodeHealth');
    nh.innerHTML = (health.auditNodes || []).map((n, i) => `
      <div class="act-row">
        <div class="act-main">
          <div class="act-title">audit_node_${i + 1}</div>
          <div class="act-sub">${esc(n.uri || 'in-memory')}</div>
        </div>
        <span class="pill ${n.healthy ? 'ok' : 'err'}">${n.healthy ? 'UP' : 'DOWN'}</span>
      </div>`).join('');
  } catch (e) {
    showToast('Erro', e.message, 'error');
  }
}

document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
