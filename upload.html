<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Incorrupt — Registo de Prova</title>
<link rel="stylesheet" href="/public/theme.css">
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="topbar">
    <h2>Registo de Prova</h2>
    <div class="bft-tag">Consenso BFT</div>
  </div>

  <div class="scroll-area">
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Nós ativos</div><div class="stat-value" id="statNodes" style="color:var(--ok)">—</div></div>
      <div class="stat"><div class="stat-label">Quórum BFT</div><div class="stat-value" id="statQuorum" style="color:var(--acc)">—</div></div>
      <div class="stat"><div class="stat-label">Ambiente</div><div class="stat-value" id="statMode">—</div></div>
    </div>

    <div class="nodes" id="nodesGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 24px;">
      <!-- Skeletons before load -->
      <div class="skeleton" style="height: 70px;"></div>
      <div class="skeleton" style="height: 70px;"></div>
      <div class="skeleton" style="height: 70px;"></div>
    </div>


    <div class="panel spotlight">
      <div class="panel-hdr"><span>Carregar prova</span></div>
      <div class="panel-body grid-2">
        <div>
          <label>Ficheiro a registar</label>
          <input type="file" id="evidenceFile">
          <button class="btn" id="btnUpload" onclick="doUpload()">Registar prova</button>
          <p style="font-size:12px;color:var(--muted);margin-top:12px">O SHA-256 é calculado localmente e assinado no seu dispositivo antes de ser enviado para consenso.</p>
        </div>
        <div id="uploadResponse" style="background:var(--bg-soft); border:1px solid var(--brd); border-radius:9px; padding:16px; font-family:var(--mono); font-size:12px; color:var(--muted); white-space:pre-wrap; line-height:1.6">A aguardar ficheiro…</div>
      </div>
    </div>
  </div>
</main>

<script src="/public/app.js"></script>
<script>
async function doUpload() {
  const file = document.getElementById('evidenceFile').files[0];
  const box = document.getElementById('uploadResponse');
  const btn = document.getElementById('btnUpload');

  if(!file) {
    showToast('Atenção', 'Selecione um ficheiro primeiro.', 'error');
    return;
  }

  btn.innerHTML = '<span class="spin"></span> A enviar…';
  btn.disabled = true;
  box.style.color = 'var(--muted)';
  box.textContent = `A processar "${file.name}"…\nA calcular SHA-256 localmente…`;

  try {
    // 1. Hash local (para assinar)
    const arrayBuffer = await file.arrayBuffer();
    const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const fileHashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

    box.textContent += `\nSHA-256: ${fileHashHex}\nA assinar (ECDSA)…`;

    // 2. Assinar o hash
    let signature = 'NONE';
    let publicKey = 'NONE';
    try {
        signature = await signData(fileHashHex);
        publicKey = await getPublicKeyHex();
        box.textContent += `\nAssinatura: ${signature.substring(0,32)}…`;
    } catch (e) {
        box.textContent += `\n[aviso] Não foi possível assinar (registo sem não-repúdio).`;
    }

    box.textContent += `\nA aguardar consenso BFT…`;

    // 3. Enviar para o servidor
    const form = new FormData();
    form.append('evidence_file', file);
    form.append('signature', signature);
    form.append('publicKey', publicKey);

    const authToken = localStorage.getItem('dems_token');
    const r = await fetch('/api/v1/evidence/upload', {
      method: 'POST',
      headers: {'Authorization': 'Bearer '+authToken},
      body: form
    });
    const d = await r.json();

    if(r.ok) {
      box.style.color = 'var(--ok)';
      box.textContent = `Concluído.\nFicheiro: ${file.name}\nSHA-256: ${d.fileHash}\nBloco #${d.blockIndex ?? '?'} registado na cadeia de custódia.`;
      showToast('Prova registada', 'Ficheiro gravado na cadeia de custódia.', 'success');
    } else {
      box.style.color = 'var(--err)';
      box.textContent = `Falhou.\n${d.message}`;
      showToast('Erro', d.message, 'error');
    }
  } catch(e) {
    box.style.color = 'var(--err)';
    box.textContent = 'Erro: ' + e.message;
    showToast('Erro', e.message, 'error');
  } finally {
    btn.innerHTML = 'Registar prova';
    btn.disabled = false;
  }
}

</script>
</body>
</html>
