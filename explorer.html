<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Incorrupt — Explorador da Cadeia</title>
<link rel="stylesheet" href="/public/theme.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="topbar">
    <h2>Explorador da Cadeia</h2>
    <div class="bft-tag">Consenso BFT</div>
  </div>

  <div class="scroll-area">
    <p class="page-desc">Registos certificados na cadeia de custódia. Cada bloco encadeia com o anterior por hash e traz um quorum certificate dos nós de auditoria.</p>

    <div class="stat-grid" id="summary">
      <div class="stat"><div class="stat-label">Total de blocos</div><div class="stat-value" id="sTotal">—</div></div>
      <div class="stat"><div class="stat-label">Provas</div><div class="stat-value" id="sProofs" style="color:var(--acc)">—</div></div>
      <div class="stat"><div class="stat-label">Transferências</div><div class="stat-value" id="sTransfers">—</div></div>
      <div class="stat"><div class="stat-label">Acessos</div><div class="stat-value" id="sAccess">—</div></div>
    </div>

    <div class="panel">
      <div class="panel-hdr">
        <span>Últimos registos</span>
        <button class="btn-sm" onclick="loadBlocks()">Atualizar</button>
      </div>
      <div class="panel-body">
        <div id="blockList">
          <div class="skeleton" style="height:90px; margin-bottom:12px"></div>
          <div class="skeleton" style="height:90px"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="/public/app.js"></script>
<script>
let globalBlocks = [];

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ACTION_LABEL = { EVIDENCE_UPLOAD: 'Registo de prova', CUSTODY_TRANSFER: 'Transferência de custódia' };
const actionLabel = (a) => ACTION_LABEL[a] || (a || '').replace('ACCESS_LOG:', 'Acesso: ');

function blockCard(b, idx) {
  const hasIPFS = b.fileCID && !['N/A', 'CID_PENDING', 'CID_OFFLINE', ''].includes(b.fileCID);
  const ipfsRow = hasIPFS
    ? `<div class="kv-row"><span class="k">IPFS</span><span class="v"><a href="https://gateway.pinata.cloud/ipfs/${esc(b.fileCID)}" target="_blank" style="color:var(--acc)">${esc(b.fileCID)}</a></span></div>`
    : '';
  const sigRow = (b.signature && b.signature !== 'NONE')
    ? `<div class="kv-row"><span class="k">Assinatura do autor</span><span class="v">${esc(b.signature.slice(0, 48))}…</span></div>`
    : '';
  const fileHashRow = (b.fileHash && b.fileHash !== 'LEGACY')
    ? `<div class="kv-row"><span class="k">SHA-256 da prova</span><span class="v">${esc(b.fileHash)}</span></div>`
    : '';
  const when = new Date(b.timestamp).toLocaleString('pt-PT');
  const timeSrc = b.timeSource === 'NTP_SECURE' ? 'NTP' : 'hora local';

  let metaSection = '';
  if (b.metadata && b.metadata !== 'NONE') {
    let mapDiv = '';
    try {
      const m = JSON.parse(b.metadata);
      if (m.latitude && m.longitude) {
        mapDiv = `<div id="map-${b.blockIndex}" style="flex:1; min-width:240px; height:140px; border-radius:8px; overflow:hidden; border:1px solid var(--brd)"></div>`;
      }
    } catch {}
    const title = b.action === 'CUSTODY_TRANSFER' ? 'Registo de transferência de custódia' : 'Metadados (EXIF)';
    metaSection = `
      <div style="margin-top:16px; border-top:1px solid var(--brd); padding-top:14px">
        <div style="font-size:12px; font-weight:600; color:var(--muted); margin-bottom:10px">${title}</div>
        <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:stretch">
          <div class="mono" style="flex:1; min-width:240px; background:var(--bg-soft); border:1px solid var(--brd); border-radius:8px; padding:10px; font-size:11px; color:var(--muted); white-space:pre-wrap; word-break:break-word">${esc(b.metadata)}</div>
          ${mapDiv}
        </div>
      </div>`;
  }

  return `
    <div class="panel" style="margin-bottom:14px">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; padding:14px 18px; border-bottom:1px solid var(--brd)">
        <div style="display:flex; align-items:center; gap:10px; min-width:0">
          <span class="mono" style="color:var(--muted); font-size:12px">#${b.blockIndex}</span>
          <span style="font-weight:600; overflow:hidden; text-overflow:ellipsis">${esc(b.fileName)}</span>
          <span class="pill">${actionLabel(b.action)}</span>
        </div>
        <div style="display:flex; align-items:center; gap:10px">
          <span class="pill ok">${b.consensusCount} nós</span>
          <button class="btn-sm" onclick="exportPDF(${idx})">Certificado PDF</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="kv-list">
          <div class="kv-row"><span class="k">Hash do bloco</span><span class="v">${esc(b.currentHash)}</span></div>
          ${fileHashRow}
          ${sigRow}
          <div class="kv-row"><span class="k">Autor</span><span class="v">${esc(b.actorEmail)} · ${esc(b.actorRole)}</span></div>
          <div class="kv-row"><span class="k">Data</span><span class="v">${when} · ${timeSrc}</span></div>
          ${ipfsRow}
        </div>
        ${metaSection}
      </div>
    </div>`;
}

async function loadBlocks() {
  const authToken = localStorage.getItem('dems_token');
  const list = document.getElementById('blockList');
  list.innerHTML = '<div class="skeleton" style="height:90px; margin-bottom:12px"></div><div class="skeleton" style="height:90px"></div>';

  try {
    const d = await (await fetch('/api/v1/chain/blocks?limit=50', { headers: { 'Authorization': 'Bearer ' + authToken } })).json();
    if (!d.blocks || d.blocks.length === 0) {
      list.innerHTML = '<div class="empty">Ainda não há blocos na cadeia.</div>';
      return;
    }
    globalBlocks = d.blocks;
    updateSummary(d.blocks);
    list.innerHTML = d.blocks.map((b, i) => blockCard(b, i)).join('');

    // Inicializa mapas para blocos com geolocalização.
    setTimeout(() => {
      d.blocks.forEach(b => {
        if (b.metadata && b.metadata !== 'NONE') {
          try {
            const m = JSON.parse(b.metadata);
            const id = 'map-' + b.blockIndex;
            if (m.latitude && m.longitude && document.getElementById(id)) {
              const map = L.map(id).setView([m.latitude, m.longitude], 14);
              L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
              L.marker([m.latitude, m.longitude]).addTo(map);
            }
          } catch {}
        }
      });
    }, 100);
  } catch (e) {
    list.innerHTML = `<div class="empty" style="color:var(--err)">Erro: ${esc(e.message)}</div>`;
    showToast('Erro', e.message, 'error');
  }
}

function updateSummary(blocks) {
  const n = (pred) => blocks.filter(pred).length;
  document.getElementById('sTotal').textContent = blocks.length;
  document.getElementById('sProofs').textContent = n(b => b.action === 'EVIDENCE_UPLOAD');
  document.getElementById('sTransfers').textContent = n(b => b.action === 'CUSTODY_TRANSFER');
  document.getElementById('sAccess').textContent = n(b => (b.action || '').startsWith('ACCESS_LOG'));
}

// Certificado PDF — sóbrio, factual (sem afirmações exageradas).
function exportPDF(index) {
  const b = globalBlocks[index];
  if (!b) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFont('helvetica', 'bold'); doc.setFontSize(18); doc.setTextColor(20, 20, 20);
  doc.text('Incorrupt', 20, 24);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(11); doc.setTextColor(90, 90, 90);
  doc.text('Certificado de registo na cadeia de custódia', 20, 31);
  doc.setDrawColor(210); doc.line(20, 36, 190, 36);

  let y = 48;
  const row = (label, value) => {
    doc.setFont('helvetica', 'normal'); doc.setTextColor(120, 120, 120); doc.setFontSize(9);
    doc.text(label, 20, y);
    doc.setTextColor(20, 20, 20); doc.setFontSize(10);
    doc.text(doc.splitTextToSize(String(value), 120), 70, y);
    y += 11;
  };
  row('Bloco', '#' + b.blockIndex);
  row('Hash do bloco', b.currentHash);
  row('SHA-256 da prova', b.fileHash || 'N/A');
  row('Ficheiro', b.fileName + '  (' + (b.fileSize || 0) + ' bytes)');
  row('Data', new Date(b.timestamp).toISOString() + '  (' + (b.timeSource === 'NTP_SECURE' ? 'NTP' : 'hora local') + ')');
  row('Autor', b.actorEmail + '  (' + b.actorRole + ')');
  row('Quorum certificate', b.consensusCount + ' assinaturas de nós de auditoria distintos');
  if (b.fileCID && !['N/A', 'CID_OFFLINE', 'CID_PENDING', ''].includes(b.fileCID)) row('IPFS CID', b.fileCID);

  y += 6;
  doc.setDrawColor(210); doc.line(20, y, 190, y); y += 10;
  doc.setTextColor(110, 110, 110); doc.setFontSize(8.5);
  doc.text(doc.splitTextToSize(
    'A autenticidade verifica-se recalculando o SHA-256 do ficheiro e confirmando que consta deste bloco, ' +
    'e validando as assinaturas Ed25519 do quorum certificate. Verificação pública em /verify.', 170), 20, y);

  doc.save(`certificado_bloco_${b.blockIndex}_${(b.fileName || 'prova').replace(/[^a-zA-Z0-9]/g, '_')}.pdf`);
}

document.addEventListener('DOMContentLoaded', loadBlocks);
</script>
</body>
</html>
