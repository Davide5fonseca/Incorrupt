networks:
  public_net:
    driver: bridge
  audit_net:
    driver: bridge
    internal: true   # REQ-01: Audit nodes are strictly isolated from the internet

volumes:
  pg_data:
  node1_data:
  node2_data:
  node3_data:
  node4_data:

services:

  # ── Orchestrator (API Gateway) ─────────────────────────────
  orchestrator:
    build: ./orchestrator
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres_db
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD em falta no .env}
      - POSTGRES_DB=${POSTGRES_DB:-dems_orchestrator}
    ports:
      - "8888:8080"
    networks:
      - public_net
      - audit_net
    volumes:
      # Mount Google service account key if present (optional)
      - ./google-key.json:/app/google-key.json:ro
    depends_on:
      postgres_db:
        condition: service_healthy
      audit_node_1:
        condition: service_started
      audit_node_2:
        condition: service_started
      audit_node_3:
        condition: service_started
      audit_node_4:
        condition: service_started
    restart: on-failure

  # ── PostgreSQL (Auth DB) ───────────────────────────────────
  postgres_db:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD em falta no .env}
      - POSTGRES_DB=${POSTGRES_DB:-dems_orchestrator}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - audit_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-dems_orchestrator}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Audit Nodes (BFT fan-out) ──────────────────────────────
  # Cada nó é um mongod STANDALONE e INDEPENDENTE. NÃO formam um
  # replica set: se formassem, o driver encaminharia todas as
  # ligações para o primary e os 4 "nós" seriam a mesma cópia —
  # o que anularia a verificação cross-node. O ConsensusManager
  # liga-se a cada um separadamente e replica por consenso (quorum
  # certificate Ed25519), não por replicação do Mongo.
  audit_node_1:
    image: mongo:6.0
    command: ["--bind_ip_all"]
    volumes:
      - node1_data:/data/db
    networks:
      - audit_net
    restart: unless-stopped

  audit_node_2:
    image: mongo:6.0
    command: ["--bind_ip_all"]
    volumes:
      - node2_data:/data/db
    networks:
      - audit_net
    restart: unless-stopped

  audit_node_3:
    image: mongo:6.0
    command: ["--bind_ip_all"]
    volumes:
      - node3_data:/data/db
    networks:
      - audit_net
    restart: unless-stopped

  # 3f+1 (f=1) → 4 nós permitem tolerar 1 nó bizantino.
  audit_node_4:
    image: mongo:6.0
    command: ["--bind_ip_all"]
    volumes:
      - node4_data:/data/db
    networks:
      - audit_net
    restart: unless-stopped