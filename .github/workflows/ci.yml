name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancela execuções antigas do mesmo ref quando há um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck & testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: orchestrator/package-lock.json

      # O mongodb-memory-server descarrega um binário do mongod na 1.ª
      # execução; em cache para acelerar os testes de integração.
      - name: Cache do binário MongoDB
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Testes unitários + HTTP
        run: npm test

      - name: Testes de integração (consenso BFT)
        run: npm run test:integration
