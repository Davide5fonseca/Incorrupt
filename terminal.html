<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Incorrupt — Consola de Consulta</title>
<link rel="stylesheet" href="/public/theme.css">
<style>
  .console { background: var(--bg-soft); border: 1px solid var(--brd); border-radius: var(--radius); flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .console-output { flex: 1; overflow-y: auto; font-family: var(--mono); font-size: 12.5px; line-height: 1.65; color: var(--txt-dim); padding: 18px; white-space: pre-wrap; word-break: break-word; }
  .console-output div { min-height: 1em; }
  .console-input-line { display: flex; align-items: center; border-top: 1px solid var(--brd); padding: 11px 18px; }
  .console-prompt { color: var(--acc); margin-right: 10px; font-family: var(--mono); font-size: 13px; }
  .console-input { background: transparent; border: none; outline: none; color: var(--txt); font-family: var(--mono); font-size: 13px; flex: 1; caret-color: var(--acc); }
  .c-sys { color: var(--muted); }
  .c-ok  { color: var(--ok); }
  .c-err { color: var(--err); }
  .c-key { color: var(--acc); }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<main class="main">
  <div class="topbar">
    <h2>Consola de Consulta</h2>
    <div class="bft-tag">Somente leitura</div>
  </div>

  <div style="flex:1; padding:28px; overflow:hidden; display:flex;">
    <div class="console">
      <div class="console-output" id="out"></div>
      <div class="console-input-line">
        <span class="console-prompt">incorrupt&gt;</span>
        <input type="text" class="console-input" id="cmd" autocomplete="off" spellcheck="false" autofocus>
      </div>
    </div>
  </div>
</main>

<div id="toast-container"></div>
<script src="/public/app.js"></script>
<script>
  const out = document.getElementById('out');
  const cmdInput = document.getElementById('cmd');
  const token = () => localStorage.getItem('dems_token');

  // ── Helpers de saída (DOM + textContent → sem XSS) ──
  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }
  function push(node) { out.appendChild(node); out.scrollTop = out.scrollHeight; }
  function line(text, cls) { push(el('div', cls, text)); }
  function blank() { push(el('div', null, ' ')); }
  function kv(key, value, valueCls) {
    const d = el('div');
    d.appendChild(el('span', 'c-key', key));
    d.appendChild(document.createTextNode('  '));
    d.appendChild(el('span', valueCls || null, String(value)));
    push(d);
  }
  function echo(raw) {
    const d = el('div');
    d.appendChild(el('span', 'c-key', 'incorrupt> '));
    d.appendChild(document.createTextNode(raw));
    push(d);
  }

  async function api(path) {
    const res = await fetch('/api/v1' + path, { headers: { 'Authorization': 'Bearer ' + token() } });
    return res.json();
  }

  const fmtDate = (t) => new Date(t).toLocaleString('pt-PT');

  const COMMANDS = [
    ['help',                'Mostra esta ajuda'],
    ['status',              'Estado dos nós de auditoria e do quórum'],
    ['whoami',              'Utilizador da sessão atual'],
    ['blocks [n]',          'Lista os últimos n blocos (máx. 100)'],
    ['find <nome>',         'Procura provas por nome de ficheiro'],
    ['trail <fileHash>',    'Trilho de acessos/verificações de um ficheiro'],
    ['verify <blockHash>',  'Detalhe e certificado de quórum de um bloco'],
    ['integrity',           'Verificação de integridade da cadeia'],
    ['clear',               'Limpa o ecrã'],
  ];

  async function run(raw) {
    const args = raw.trim().split(/\s+/).filter(Boolean);
    if (!args.length) return;
    echo(raw);
    const cmd = args[0].toLowerCase();

    try {
      switch (cmd) {
        case 'help':
          line('Comandos disponíveis:', 'c-sys');
          for (const [c, desc] of COMMANDS) {
            const d = el('div');
            d.appendChild(el('span', 'c-key', '  ' + c.padEnd(20)));
            d.appendChild(document.createTextNode(desc));
            push(d);
          }
          break;

        case 'clear':
          out.innerHTML = '';
          return;

        case 'status': {
          const d = await api('/health');
          kv('Modo', d.mode || '—');
          (d.auditNodes || []).forEach((n, i) => {
            const up = n.healthy;
            kv('  audit_node_' + (i + 1), up ? 'UP' : 'DOWN', up ? 'c-ok' : 'c-err');
          });
          const q = d.quorum || {};
          line(`Quórum: ${q.healthy}/${q.total} (mínimo ${q.quorum}) — ${q.quorumAchievable ? 'garantido' : 'em falha'}`,
               q.quorumAchievable ? 'c-ok' : 'c-err');
          break;
        }

        case 'whoami': {
          const raw = localStorage.getItem('dems_user');
          if (!raw) { line('Sem sessão ativa.', 'c-err'); break; }
          const u = JSON.parse(raw);
          kv('Nome',  u.name);
          kv('Email', u.email);
          kv('Perfil', u.role);
          break;
        }

        case 'blocks': {
          const n = Math.min(parseInt(args[1]) || 10, 100);
          const d = await api('/chain/blocks?limit=' + n);
          const blocks = d.blocks || [];
          if (!blocks.length) { line('Sem blocos.', 'c-sys'); break; }
          for (const b of blocks) {
            const row = el('div');
            row.appendChild(el('span', 'c-key', '#' + b.blockIndex + '  '));
            row.appendChild(document.createTextNode(`${b.action}  ·  ${b.fileName}  ·  ${b.consensusCount} nós  ·  ${fmtDate(b.timestamp)}`));
            push(row);
          }
          break;
        }

        case 'find': {
          const term = args.slice(1).join(' ').toLowerCase();
          if (!term) { line('Uso: find <nome>', 'c-err'); break; }
          const d = await api('/chain/blocks?limit=1000');
          const matches = (d.blocks || []).filter(b => b.action === 'EVIDENCE_UPLOAD' && (b.fileName || '').toLowerCase().includes(term));
          if (!matches.length) { line('Sem resultados para "' + term + '".', 'c-sys'); break; }
          for (const b of matches) {
            kv('Ficheiro', b.fileName);
            kv('  SHA-256', b.fileHash);
            kv('  Bloco', '#' + b.blockIndex + '  (' + String(b.currentHash).slice(0, 16) + '…)');
            kv('  Registado por', `${b.actorEmail} (${b.actorRole})`);
            kv('  Data', fmtDate(b.timestamp));
            kv('  Consenso', b.consensusCount + ' nós');
            if (b.metadata && b.metadata !== 'NONE') {
              try {
                const m = JSON.parse(b.metadata);
                line('  Metadados:', 'c-sys');
                for (const k in m) kv('    ' + k, m[k]);
                if (m.latitude && m.longitude) {
                  const d3 = el('div');
                  d3.appendChild(el('span', 'c-key', '    localização  '));
                  const a = el('a', null, 'abrir no mapa');
                  a.href = 'https://www.google.com/maps?q=' + encodeURIComponent(m.latitude + ',' + m.longitude);
                  a.target = '_blank';
                  a.style.color = 'var(--acc)';
                  d3.appendChild(a);
                  push(d3);
                }
              } catch { /* metadata não-JSON */ }
            }
            blank();
          }
          break;
        }

        case 'trail': {
          const hash = args[1];
          if (!hash) { line('Uso: trail <fileHash>', 'c-err'); break; }
          const d = await api('/chain/blocks?limit=1000');
          const logs = (d.blocks || []).filter(b => (b.action || '').startsWith('ACCESS_LOG') && b.fileHash === hash);
          if (!logs.length) { line('Sem registos de acesso para este ficheiro.', 'c-sys'); break; }
          line('Trilho de acessos:', 'c-sys');
          logs.slice().reverse().forEach((l, i) => {
            line(`  [${i + 1}] ${fmtDate(l.timestamp)} · ${l.actorEmail} (${l.actorRole}) · bloco #${l.blockIndex}`);
          });
          break;
        }

        case 'verify': {
          const h = args[1];
          if (!h) { line('Uso: verify <blockHash>', 'c-err'); break; }
          const d = await api('/chain/block/' + encodeURIComponent(h));
          if (d.error || !d.block) { line('Bloco não encontrado.', 'c-err'); break; }
          const b = d.block;
          kv('Bloco', '#' + b.blockIndex);
          kv('  Hash', b.currentHash);
          kv('  Anterior', b.previousHash);
          kv('  Ficheiro', `${b.fileName}  (${String(b.fileHash).slice(0, 16)}…)`);
          kv('  Quórum cert.', b.consensusCount + ' assinaturas de nós distintos', 'c-ok');
          const integ = await api('/chain/integrity');
          line('Integridade da cadeia: ' + (integ.valid ? 'íntegra' : 'COMPROMETIDA'), integ.valid ? 'c-ok' : 'c-err');
          break;
        }

        case 'integrity': {
          const d = await api('/chain/integrity');
          kv('Estado', d.valid ? 'íntegra' : 'COMPROMETIDA', d.valid ? 'c-ok' : 'c-err');
          kv('  Blocos', d.totalBlocks);
          kv('  Certificados (quórum)', d.certifiedBlocks);
          if (!d.valid && d.reason) kv('  Motivo', d.reason, 'c-err');
          break;
        }

        default:
          line(`Comando desconhecido: ${cmd}. Escreve 'help'.`, 'c-err');
      }
    } catch (e) {
      line('Erro: ' + e.message, 'c-err');
    }
    blank();
  }

  cmdInput.addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    const val = cmdInput.value;
    cmdInput.value = '';
    cmdInput.disabled = true;
    await run(val);
    cmdInput.disabled = false;
    cmdInput.focus();
  });

  document.querySelector('.console').addEventListener('click', () => cmdInput.focus());

  // Banner inicial
  line('Consola de consulta Incorrupt — somente leitura.', 'c-sys');
  line("Escreve 'help' para ver os comandos.", 'c-sys');
  blank();
</script>
</body>
</html>
